<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100">
    <!-- Navigation -->
    <nav class="bg-gray-900 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="{% url 'dashboard:index' %}" class="text-2xl font-bold text-blue-500">
                        Startup Garage
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <!-- Error Code -->
                <div class="mb-8">
                    <h1 class="text-9xl font-bold text-gray-700 mb-4">500</h1>
                    <p class="text-4xl font-bold text-white mb-2">Internal Server Error</p>
                    <p class="text-gray-400 text-lg">Something went wrong on our end.</p>
                </div>

                <!-- Error Details -->
                <div class="bg-gray-900 border border-red-900 rounded-xl p-8 mb-8 max-w-md mx-auto">
                    <div class="mb-6 text-center">
                        <div class="w-16 h-16 bg-red-900 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4v2m0 0H8m4 0h4m0 0v2m0-6V7a2 2 0 00-2-2H8a2 2 0 00-2 2v6m0 0v2"></path>
                            </svg>
                        </div>
                    </div>
                    <p class="text-gray-300 mb-6">
                        Our development team has been notified. Please try again in a few moments.
                    </p>
                    <div class="space-y-3">
                        <a href="{% url 'dashboard:index' %}" class="block w-full px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition">
                            Go to Dashboard
                        </a>
                        <a href="javascript:location.reload()" class="block w-full px-6 py-3 bg-gray-800 hover:bg-gray-700 text-white font-semibold rounded-lg transition">
                            Retry
                        </a>
                    </div>
                </div>

                <!-- Status -->
                <div class="text-sm text-gray-500">
                    <p>Error ID: {{ request.id }}</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 border-t border-gray-800 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="text-center text-gray-400">
                <p>&copy; 2026 Startup Garage. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
