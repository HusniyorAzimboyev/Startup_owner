{% extends "base.html" %}

{% block title %}Delete Task - Startup Garage{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-gray-900 border border-red-900/50 rounded-xl shadow-2xl p-8">
        <h1 class="text-3xl font-bold text-white mb-2">Delete Task</h1>
        <p class="text-gray-400 mb-8">Are you sure you want to delete this task?</p>

        <!-- Task Info -->
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-6 mb-8">
            <p class="text-gray-400 text-sm">Task</p>
            <p class="text-2xl font-semibold text-white mt-2">{{ object.title }}</p>
            {% if object.description %}
                <p class="text-gray-300 mt-4">{{ object.description }}</p>
            {% endif %}
        </div>

        <!-- Confirmation Form -->
        <form method="post" class="flex gap-4">
            {% csrf_token %}
            <button type="submit" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                Delete Task
            </button>
            <a href="{% url 'tasks:task-board' %}" class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 text-center">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
